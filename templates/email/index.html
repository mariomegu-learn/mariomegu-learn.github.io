<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Marketing</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4; font-family: Century Gothic, Arial, sans-serif;">
    <!-- Header / Encabezado -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #005CFE;">
        <tr>
            <td align="center" style="padding: 30px;">
                <!-- Texto del encabezado -->
            </td>
        </tr>
    </table>
<br>
    <!-- Contenido Principal -->
    <table role="presentation" width="800" cellpadding="0" cellspacing="0" style="margin: 0 auto; background-color: #ffffff; border-radius: 8px;">
        <tr>
            <td style="padding: 40px 30px;">
                <h3 style="color: #333333; margin: 0 0 20px 0; font-size: 22px; font-family: Century Gothic, Arial, sans-serif;">Hola [Nombre],</h3>
                <p style="color: #666666; margin: 0 0 20px 0; font-size: 16px; line-height: 1.5; font-family: Century Gothic, Arial, sans-serif;">
                    Gracias por suscribirte a nuestro newsletter. Aquí encontrarás las últimas noticias, ofertas exclusivas y contenido destacado.
                </p>
                <ul style="color: #666666; margin: 0 0 30px 0; padding-left: 20px; font-family: Century Gothic, Arial, sans-serif; list-style-type: disc;">
                    <li style="color: #005CFE; margin-bottom: 10px; font-size: 16px;"><span style="color: #666666;">Beneficio 1</span></li>
                    <li style="color: #005CFE; margin-bottom: 10px; font-size: 16px;"><span style="color: #666666;">Beneficio 2</span></li>
                    <li style="color: #005CFE; font-size: 16px;"><span style="color: #666666;">Beneficio 3</span></li>
                </ul>

                <!-- Botón CTA - Compatibilidad Outlook -->
                <table role="presentation" cellpadding="0" cellspacing="0" align="center">
                    <tr>
                        <td align="center" style="border-radius: 4px;" bgcolor="#005CFE">
                            <!--[if mso]>
                            <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="#" style="height:44px;v-text-anchor:middle;width:200px;" arcsize="10%" strokecolor="#005CFE" fillcolor="#005CFE">
                                <w:anchorlock/>
                                <center style="color:#ffffff;font-family:Arial,sans-serif;font-size:16px;font-weight:bold;">Ver Ofertas</center>
                            </v:roundrect>
                            <![endif]-->
                            <!--[if !mso]><!-->
                            <a href="#" style="display: inline-block; background-color: #005CFE; color: #FFFFFF; padding: 14px 30px; text-decoration: none; border-radius: 4px; font-size: 16px; font-weight: bold; font-family: Century Gothic, Arial, sans-serif;" onmouseover="this.style.color='#FFFFFF'" onmouseout="this.style.color='#FFFFFF'" onclick="this.style.color='#FFFFFF'">Ver Ofertas</a>
                            <!--<![endif]-->
                        </td>
                    </tr>
                </table>
                <p style="color: #666666; margin: 20px 0 0 0; font-size: 16px; line-height: 1.5; font-family: Century Gothic, Arial, sans-serif;">
                    Explora nuestras secciones y descubre todo lo que tenemos para ti.
                </p>
            </td>
        </tr>
    </table>

    <!-- Footer / Pie -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #005CFE; margin-top: 20px;">
        <tr>
            <td align="center" style="padding: 30px;">
                <!-- Texto del pie -->
            </td>
        </tr>
    </table>
</body>
</html>
